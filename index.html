<style>
  :root {
    --bg: #0a0e1a;
    --bg-elev: #111827;
    --bg-elev-2: #1a2030;
    --ink: #e8ecf5;
    --ink-dim: #8892a6;
    --ink-faint: #4a5268;
    --accent: #ff6b35;
    --accent-2: #00d4a8;
    --accent-3: #ffd23f;
    --danger: #ff3e5f;
    --line: #212838;
    --line-strong: #303a52;
    --grid: rgba(255,255,255,0.04);
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,107,53,0.08), transparent 40%),
      radial-gradient(circle at 88% 92%, rgba(0,212,168,0.06), transparent 45%);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 48px 32px 120px; }

  header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--line); padding-bottom: 24px; margin-bottom: 48px; flex-wrap: wrap; gap: 24px; }
  .brand-block { flex: 1 1 auto; }
  .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  .eyebrow .dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,107,53,0.6);} 50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(255,107,53,0);} }
  h1 { font-family: var(--serif); font-weight: 900; font-size: clamp(40px, 6vw, 72px); line-height: 0.95; letter-spacing: -0.03em; font-variation-settings: "opsz" 144; }
  h1 em { font-style: italic; font-weight: 400; color: var(--accent); font-variation-settings: "opsz" 144, "wght" 400; }
  .sub { color: var(--ink-dim); font-size: 13px; margin-top: 8px; max-width: 560px; }
  .meta-stack { display: flex; gap: 24px; align-items: flex-end; }
  .stat { text-align: right; }
  .stat .num { font-family: var(--serif); font-size: 44px; font-weight: 600; line-height: 1; letter-spacing: -0.02em; }
  .stat .num.accent { color: var(--accent); }
  .stat .num.mint { color: var(--accent-2); }
  .stat .lbl { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); margin-top: 6px; }

  .grid-main { display: grid; grid-template-columns: 1fr 420px; gap: 48px; }
  @media (max-width: 1024px) { .grid-main { grid-template-columns: 1fr; } }

  section { margin-bottom: 56px; }
  .section-title { display: flex; align-items: baseline; gap: 16px; margin-bottom: 20px; }
  .section-title .num { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.1em; }
  .section-title h2 { font-family: var(--serif); font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
  .section-title .line { flex: 1; height: 1px; background: var(--line); }

  .card { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 2px; padding: 24px; position: relative; }
  .card.glow { border-color: var(--line-strong); box-shadow: 0 0 0 1px rgba(255,107,53,0.1) inset, 0 20px 60px -20px rgba(0,0,0,0.8); }

  #chart-wrap { position: relative; height: 360px; padding: 8px; }
  .chart-legend { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--line); }
  .legend-row { display: grid; grid-template-columns: 16px 1fr auto auto; align-items: center; gap: 10px; font-size: 12px; }
  .legend-row .swatch { width: 10px; height: 10px; border-radius: 50%; }
  .legend-row .name { color: var(--ink); }
  .legend-row .pct { color: var(--ink-dim); }
  .legend-row .cnt { color: var(--ink-faint); font-size: 11px; }

  .filterbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 12px; border: 1px solid var(--line-strong); background: transparent; color: var(--ink-dim); cursor: pointer; transition: all 0.15s; border-radius: 1px; font-family: inherit; }
  .chip:hover { color: var(--ink); border-color: var(--ink-dim); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 600; }

  .qlist { display: flex; flex-direction: column; gap: 2px; }
  .qitem { display: grid; grid-template-columns: 44px 1fr auto 40px; align-items: center; padding: 18px 20px; background: var(--bg-elev); border: 1px solid var(--line); cursor: pointer; transition: all 0.15s; gap: 16px; }
  .qitem:hover { border-color: var(--accent); background: var(--bg-elev-2); }
  .qitem.bookmarked { border-left: 3px solid var(--accent-3); }
  .qitem .qnum { font-family: var(--serif); font-size: 24px; font-weight: 600; color: var(--ink-faint); font-variation-settings: "opsz" 144; }
  .qitem .qbody .qtitle { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.01em; color: var(--ink); }
  .qitem .qbody .qmeta { display: flex; gap: 12px; align-items: center; font-size: 11px; color: var(--ink-dim); letter-spacing: 0.04em; }
  .qitem .qbody .qmeta .tag { color: var(--accent-2); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
  .qitem .qbody .qmeta .sep { color: var(--line-strong); }
  .qitem .answers { text-align: right; font-size: 11px; color: var(--ink-dim); }
  .qitem .answers .wrong { color: var(--danger); }
  .qitem .answers .right { color: var(--accent-2); }
  .bookmark-btn { background: transparent; border: none; color: var(--ink-faint); font-size: 22px; cursor: pointer; padding: 6px; line-height: 1; transition: transform 0.15s, color 0.15s; font-family: inherit; }
  .bookmark-btn:hover { color: var(--accent-3); transform: scale(1.2); }
  .bookmark-btn.active { color: var(--accent-3); text-shadow: 0 0 8px rgba(255,210,63,0.4); }
  .chip.bookmark-chip { color: var(--accent-3); border-color: var(--accent-3); }
  .chip.bookmark-chip.active { background: var(--accent-3); border-color: var(--accent-3); color: #0a0e1a; }

  .service-breakdown { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .sb-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 10px; }
  .sb-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .sb-chip { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; background: rgba(255,107,53,0.06); border: 1px solid rgba(255,107,53,0.25); border-radius: 2px; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .sb-chip:hover { background: rgba(255,107,53,0.14); border-color: rgba(255,107,53,0.55); transform: translateY(-1px); }
  .sb-chip.active { background: var(--accent); border-color: var(--accent); }
  .sb-chip.active .sb-name { color: #0a0e1a; }
  .sb-chip.active .sb-count { color: #0a0e1a; }
  .sb-chip .sb-name { color: var(--ink); font-weight: 600; font-family: var(--mono); }
  .sb-chip .sb-count { color: var(--accent); font-family: var(--serif); font-weight: 600; font-size: 14px; }
  .sb-chip.hot { background: rgba(255,62,95,0.08); border-color: rgba(255,62,95,0.35); }
  .sb-chip.hot:hover { background: rgba(255,62,95,0.18); border-color: rgba(255,62,95,0.6); }
  .sb-chip.hot .sb-count { color: var(--danger); }
  .sb-chip.hot.active { background: var(--danger); border-color: var(--danger); }
  .sb-chip.hot.active .sb-name { color: #0a0e1a; }
  .sb-chip.hot.active .sb-count { color: #0a0e1a; }

  /* Active service-filter banner above question list */
  .filter-banner { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.35); border-left-width: 3px; margin-bottom: 12px; font-size: 12px; }
  .filter-banner .fb-label { color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; }
  .filter-banner .fb-name { color: var(--accent); font-family: var(--serif); font-weight: 600; font-size: 16px; }
  .filter-banner .fb-clear { margin-left: auto; background: transparent; border: 1px solid var(--line-strong); color: var(--ink-dim); font-family: inherit; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 10px; cursor: pointer; border-radius: 1px; transition: all 0.15s; }
  .filter-banner .fb-clear:hover { color: var(--accent); border-color: var(--accent); }

  /* Pagination */
  .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--line); font-size: 12px; color: var(--ink-dim); flex-wrap: wrap; }
  .pager .pg-info { letter-spacing: 0.05em; }
  .pager .pg-info strong { color: var(--ink); font-family: var(--serif); font-weight: 600; }
  .pager .pg-controls { display: flex; gap: 4px; align-items: center; }
  .pager button {
    background: transparent; border: 1px solid var(--line-strong); color: var(--ink-dim);
    font-family: inherit; font-size: 11px; letter-spacing: 0.06em; padding: 6px 12px;
    min-width: 36px; cursor: pointer; transition: all 0.15s; border-radius: 1px;
  }
  .pager button:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .pager button:disabled { opacity: 0.35; cursor: not-allowed; }
  .pager button.active { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 600; }
  .pager .pg-ellipsis { color: var(--ink-faint); padding: 0 4px; }
  .pager .pg-size { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .pager .pg-size select {
    background: var(--bg-elev-2); color: var(--ink); border: 1px solid var(--line);
    padding: 4px 8px; font-family: inherit; font-size: 11px; border-radius: 1px; cursor: pointer;
  }

  /* Range custom intervals input */
  .range-controls input[type="text"].range-text {
    width: 280px; padding: 9px 12px; background: var(--bg-elev-2);
    border: 1px solid var(--line); color: var(--ink);
    font-family: var(--mono); font-size: 13px; border-radius: 2px;
  }
  .range-controls input[type="text"].range-text:focus { outline: none; border-color: var(--accent-2); }
  .range-controls input[type="text"].range-text::placeholder { color: var(--ink-faint); }
  .range-help { font-size: 11px; color: var(--ink-faint); margin-bottom: 12px; line-height: 1.6; }
  .range-help code { background: var(--bg-elev-2); padding: 1px 6px; color: var(--accent-2); font-family: var(--mono); font-size: 11px; border-radius: 2px; }

  .qmeta-big .pill.bookmark-pill { cursor: pointer; border-color: var(--accent-3); color: var(--accent-3); transition: all 0.15s; }
  .qmeta-big .pill.bookmark-pill:hover { background: var(--accent-3); color: var(--bg); }
  .qmeta-big .pill.bookmark-pill.active { background: var(--accent-3); color: var(--bg); }

  .empty { padding: 48px 32px; text-align: center; border: 1px dashed var(--line-strong); color: var(--ink-dim); }
  .empty h3 { font-family: var(--serif); font-size: 22px; color: var(--ink); margin-bottom: 8px; font-style: italic; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(5,8,15,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg-elev); border: 1px solid var(--line-strong); max-width: 820px; width: 100%; padding: 40px; position: relative; border-radius: 2px; }
  .modal .close { position: absolute; top: 16px; right: 16px; background: none; border: 1px solid var(--line); color: var(--ink-dim); width: 36px; height: 36px; cursor: pointer; font-size: 18px; font-family: inherit; }
  .modal .close:hover { color: var(--accent); border-color: var(--accent); }
  .modal h3 { font-family: var(--serif); font-size: 32px; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 8px; }
  .modal .qmeta-big { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
  .pill { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border: 1px solid var(--line-strong); color: var(--ink-dim); }
  .pill.hot { border-color: var(--accent); color: var(--accent); }
  .pill.ok { border-color: var(--accent-2); color: var(--accent-2); }
  .modal .q-text { background: var(--bg-elev-2); padding: 20px; border-left: 3px solid var(--accent); margin-bottom: 20px; font-size: 13px; line-height: 1.7; }
  .modal h4 { font-family: var(--serif); font-size: 15px; font-weight: 600; margin: 24px 0 10px; color: var(--accent-3); }
  .modal .options { display: flex; flex-direction: column; gap: 6px; }
  .modal .opt { padding: 12px 14px; border: 1px solid var(--line); font-size: 13px; line-height: 1.5; display: flex; gap: 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .modal .opt:hover { border-color: var(--ink-dim); background: rgba(255,255,255,0.02); }
  .modal .opt .letter { font-family: var(--serif); font-weight: 900; color: var(--ink-faint); width: 20px; font-size: 16px; }
  .modal .opt.picked { border-color: var(--accent); background: rgba(255,107,53,0.06); }
  .modal .opt.picked .letter { color: var(--accent); }
  .modal .opt.correct { border-color: var(--accent-2); background: rgba(0,212,168,0.06); cursor: default; }
  .modal .opt.correct .letter { color: var(--accent-2); }
  .modal .opt.picked-wrong { border-color: var(--danger); background: rgba(255,62,95,0.06); cursor: default; }
  .modal .opt.picked-wrong .letter { color: var(--danger); }
  .modal .opt.revealed { cursor: default; }
  .modal .opt.revealed:hover { background: inherit; }

  .pill.quiz { border-color: var(--accent-2); color: var(--accent-2); }
  .pill.multi { border-color: var(--accent-3); color: var(--accent-3); background: rgba(255,210,63,0.08); }
  .pill.wrong { border-color: var(--danger); color: var(--danger); background: rgba(255,62,95,0.06); }

  /* prev / next 사이드 화살표 (뷰포트 중앙 수직 고정) */
  .modal-side-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px;
    background: rgba(17, 24, 39, 0.92);
    border: 1px solid var(--line-strong);
    color: var(--ink-dim);
    font-size: 22px; line-height: 1;
    font-family: inherit;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    z-index: 110;
    transition: all 0.15s;
  }
  .modal-side-nav.prev { left: 24px; }
  .modal-side-nav.next { right: 24px; }
  .modal-side-nav:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(255,107,53,0.1); }
  .modal-side-nav:disabled { opacity: 0.25; cursor: not-allowed; }
  @media (max-width: 640px) {
    .modal-side-nav { width: 38px; height: 38px; font-size: 18px; }
    .modal-side-nav.prev { left: 10px; }
    .modal-side-nav.next { right: 10px; }
  }
  .qhint { font-size: 11px; color: var(--ink-faint); font-style: italic; font-weight: 400; letter-spacing: 0; text-transform: none; margin-left: 8px; }

  /* 복수 정답용 체크박스 표식 (옵션 letter 앞에 붙음) */
  .modal .opt .multi-check { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border: 1px solid var(--line-strong); color: var(--accent); font-size: 12px; font-weight: 700; line-height: 1; transition: all 0.15s; flex-shrink: 0; }
  .modal .opt.picked .multi-check { border-color: var(--accent); background: rgba(255,107,53,0.14); }

  .reveal-btn { display: block; width: 100%; margin: 24px 0 8px; padding: 16px 20px; background: linear-gradient(135deg, rgba(0,212,168,0.08), rgba(255,210,63,0.05)); border: 1px dashed var(--accent-2); color: var(--accent-2); font-family: var(--serif); font-size: 16px; font-weight: 600; font-style: italic; letter-spacing: 0.02em; cursor: pointer; transition: all 0.2s; border-radius: 2px; }
  .reveal-btn:hover { background: var(--accent-2); color: var(--bg); border-style: solid; }
  .reveal-btn .sub { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-style: normal; margin-top: 4px; opacity: 0.7; }
  /* subtle: 단일답에서는 옵션 클릭이 메인 인터랙션이라 버튼은 눈에 덜 띄게 */
  .reveal-btn.subtle { margin: 18px 0 4px; padding: 10px 14px; background: transparent; border: 1px dashed var(--line-strong); color: var(--ink-dim); font-size: 12px; font-style: normal; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
  .reveal-btn.subtle:hover { border-color: var(--accent-2); color: var(--accent-2); background: transparent; border-style: dashed; }
  .reveal-btn.subtle .sub { font-size: 9px; margin-top: 2px; text-transform: none; letter-spacing: 0.05em; }

  .retry-btn { display: inline-block; margin: 16px 0 4px; padding: 7px 14px; background: transparent; border: 1px solid var(--line-strong); color: var(--ink-dim); font-family: inherit; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .retry-btn:hover { color: var(--accent); border-color: var(--accent); }
  .modal .explain { background: var(--bg-elev-2); padding: 20px; font-size: 13px; line-height: 1.7; border-top: 2px solid var(--accent-3); }
  .modal .explain p { margin-bottom: 10px; }
  .modal .explain strong { color: var(--accent-3); }

  .review-tracker { margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--line); display: flex; align-items: center; gap: 12px; }
  .review-tracker .label { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .review-tracker .count { font-family: var(--serif); font-size: 20px; color: var(--accent-3); font-weight: 600; }
  .review-btn { background: transparent; border: 1px solid var(--accent-3); color: var(--accent-3); font-size: 10px; padding: 6px 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: inherit; margin-left: auto; }
  .review-btn:hover { background: var(--accent-3); color: var(--bg); }

  .memo-section { margin-top: 24px; padding-top: 20px; border-top: 1px dashed var(--line); }
  .memo-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .memo-header .label { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--accent-2); }
  .memo-header .hint { font-size: 10px; color: var(--ink-faint); letter-spacing: 0.08em; text-transform: uppercase; }
  .memo-header .memo-status { margin-left: auto; font-size: 10px; color: var(--ink-faint); font-style: italic; transition: color 0.2s; }
  .memo-header .memo-status.saved { color: var(--accent-2); }
  .memo-box { width: 100%; min-height: 90px; background: var(--bg-elev-2); border: 1px solid var(--line); color: var(--ink); font-family: var(--mono); font-size: 12px; line-height: 1.7; padding: 12px 14px; resize: vertical; border-radius: 2px; transition: border-color 0.15s; }
  .memo-box:focus { outline: none; border-color: var(--accent-2); }
  .memo-box::placeholder { color: var(--ink-faint); font-style: italic; }

  .insight { background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(255,210,63,0.05)); border: 1px solid var(--line-strong); border-left: 3px solid var(--accent); padding: 20px 24px; margin-bottom: 24px; }
  .insight .label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .insight .msg { font-family: var(--serif); font-size: 18px; font-style: italic; color: var(--ink); letter-spacing: -0.01em; line-height: 1.4; }

  .asterisk { position: absolute; font-family: var(--serif); font-style: italic; color: var(--accent); pointer-events: none; user-select: none; }

  .footer-note { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--line); font-size: 11px; color: var(--ink-faint); letter-spacing: 0.05em; line-height: 1.7; }
  .footer-note code { background: var(--bg-elev); padding: 2px 6px; color: var(--accent-2); font-family: var(--mono); }

  /* Cloud Sync widget */
  .cloud-sync { display: inline-flex; align-items: center; gap: 10px; padding: 9px 14px; background: var(--bg-elev); border: 1px solid var(--line); font-size: 11px; letter-spacing: 0.05em; cursor: pointer; transition: border-color 0.15s; font-family: inherit; color: var(--ink); border-radius: 2px; }
  .cloud-sync:hover { border-color: var(--ink-dim); }
  .cloud-sync.online { border-color: var(--accent-2); }
  .cloud-sync .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-faint); transition: background 0.2s, box-shadow 0.2s; }
  .cloud-sync.online .dot { background: var(--accent-2); box-shadow: 0 0 0 3px rgba(0,212,168,0.18); }
  .cloud-sync.syncing .dot { background: var(--accent-3); animation: sync-pulse 1s infinite; }
  @keyframes sync-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .cloud-sync .label { color: var(--ink-dim); text-transform: uppercase; }
  .cloud-sync .email { color: var(--ink); font-weight: 600; }

  .auth-modal { max-width: 440px; }
  .auth-modal h3 { font-size: 24px; margin-bottom: 6px; }
  .auth-modal .sub { color: var(--ink-dim); font-size: 12px; margin-bottom: 20px; }
  .auth-modal input[type="email"] { width: 100%; padding: 12px 14px; background: var(--bg-elev-2); border: 1px solid var(--line); color: var(--ink); font-family: var(--mono); font-size: 13px; border-radius: 2px; margin-bottom: 12px; }
  .auth-modal input[type="email"]:focus { outline: none; border-color: var(--accent-2); }
  .auth-modal .auth-submit { width: 100%; padding: 12px; background: var(--accent-2); border: none; color: var(--bg); font-family: var(--serif); font-weight: 600; font-size: 14px; letter-spacing: 0.03em; cursor: pointer; transition: opacity 0.15s; border-radius: 2px; }
  .auth-modal .auth-submit:hover { opacity: 0.85; }
  .auth-modal .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-modal .auth-msg { margin-top: 14px; padding: 12px; border-left: 2px solid var(--accent-3); background: rgba(255,210,63,0.06); font-size: 12px; line-height: 1.6; }
  .auth-modal .auth-msg.error { border-left-color: var(--danger); background: rgba(255,62,95,0.06); color: var(--danger); }
  .auth-modal .auth-msg.ok { border-left-color: var(--accent-2); background: rgba(0,212,168,0.06); color: var(--accent-2); }
  .auth-modal .logged-in { background: var(--bg-elev-2); padding: 16px; border: 1px solid var(--line); margin-bottom: 14px; }
  .auth-modal .logged-in .who { font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--accent-2); margin-bottom: 4px; }
  .auth-modal .logged-in .since { font-size: 11px; color: var(--ink-dim); }
  .auth-modal .signout-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--danger); color: var(--danger); font-family: inherit; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
  .auth-modal .signout-btn:hover { background: var(--danger); color: var(--bg); }

  /* Range Accuracy Chart */
  .range-controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 18px; }
  .range-controls .field { display: flex; flex-direction: column; gap: 5px; }
  .range-controls label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); }
  .range-controls input[type="number"] {
    width: 90px; padding: 9px 12px; background: var(--bg-elev-2);
    border: 1px solid var(--line); color: var(--ink);
    font-family: var(--mono); font-size: 14px; border-radius: 2px;
  }
  .range-controls input[type="number"]:focus { outline: none; border-color: var(--accent-2); }
  .range-controls input[type="number"]::-webkit-outer-spin-button,
  .range-controls input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
  .range-btn {
    padding: 9px 18px; background: var(--accent); color: #0a0e1a; border: none;
    font-family: var(--serif); font-weight: 600; font-size: 14px; cursor: pointer;
    border-radius: 2px; letter-spacing: 0.02em; transition: opacity 0.15s;
  }
  .range-btn:hover { opacity: 0.85; }
  .range-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .range-preset {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 10px; border: 1px solid var(--line-strong); background: transparent;
    color: var(--ink-dim); cursor: pointer; font-family: inherit; border-radius: 1px;
    transition: all 0.15s;
  }
  .range-preset:hover { color: var(--accent-2); border-color: var(--accent-2); }
  .range-summary {
    display: flex; gap: 28px; flex-wrap: wrap; padding: 14px 18px;
    background: var(--bg-elev-2); border-left: 3px solid var(--accent);
    font-size: 13px; margin-bottom: 14px; align-items: baseline;
  }
  .range-summary .ssep { color: var(--line-strong); }
  .range-summary .smetric { color: var(--ink-dim); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .range-summary .sval { font-family: var(--serif); font-size: 22px; font-weight: 600; margin: 0 6px; }
  .range-summary .sval.wrong { color: var(--danger); }
  .range-summary .sval.right { color: var(--accent-2); }
  .range-chart-wrap { position: relative; height: 320px; margin-top: 8px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand-block">
      <div class="eyebrow"><span class="dot"></span>SAA-C03 / WRONG-ANSWER JOURNAL</div>
      <h1>오답 <em>노트</em></h1>
    </div>
    <div class="meta-stack">
      <div class="stat">
        <div class="num accent" id="stat-total">0</div>
        <div class="lbl">Total Wrong</div>
      </div>
      <div class="stat">
        <div class="num mint" id="stat-domains">0</div>
        <div class="lbl">Domains Hit</div>
      </div>
      <button class="cloud-sync" id="cloud-sync-btn" onclick="openAuthModal()">
        <span class="dot"></span>
        <span id="cloud-sync-text"><span class="label">Cloud Sync</span> <span class="email">OFF</span></span>
      </button>
    </div>
  </header>

  <div id="insight-box"></div>

  <div class="grid-main">
    <div>
      <section>
        <div class="section-title">
          <span class="num">§01</span>
          <h2>Wrong Answers</h2>
          <div class="line"></div>
        </div>
        <div class="filterbar" id="filterbar">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip bookmark-chip" data-filter="bookmarked">★ Bookmarked</button>
          <button class="chip" data-filter="1">Resilient</button>
          <button class="chip" data-filter="2">Performance</button>
          <button class="chip" data-filter="3">Secure</button>
          <button class="chip" data-filter="4">Cost</button>
        </div>
        <div id="filter-banner-slot"></div>
        <div class="qlist" id="qlist"></div>
        <div id="pager-slot"></div>
      </section>
    </div>

    <div>
      <section>
        <div class="section-title">
          <span class="num">§02</span>
          <h2>Weak Spots</h2>
          <div class="line"></div>
        </div>
        <div class="card glow" style="position: relative;">
          <span class="asterisk" style="top: 12px; right: 18px; font-size: 32px;">*</span>
          <div id="chart-wrap"><canvas id="domain-chart"></canvas></div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>
      </section>
    </div>
  </div>

  <section style="margin-top: 16px;">
    <div class="section-title">
      <span class="num">§03</span>
      <h2>Range Accuracy</h2>
      <div class="line"></div>
    </div>
    <div class="card glow" style="position: relative;">
      <span class="asterisk" style="top: 12px; right: 18px; font-size: 32px;">*</span>
      <div class="range-controls">
        <div class="field" style="flex: 1; min-width: 280px;">
          <label for="range-input">구간</label>
          <input type="text" id="range-input" class="range-text" value="1-10, 11-20, 21-30, 31-40, 41-50, 51-60, 61-70, 71-80, 81-90, 91-100"
                 placeholder="예: 1-10, 11-51, 52-102  또는  1-100/10" />
        </div>
        <button class="range-btn" onclick="renderRangeChart()">계산</button>
        <div class="range-presets">
          <button class="range-preset" onclick="setRangePreset('1-50/10')">1–50</button>
          <button class="range-preset" onclick="setRangePreset('51-100/10')">51–100</button>
          <button class="range-preset" onclick="setRangePreset('1-100/10')">1–100</button>
          <button class="range-preset" onclick="setRangePreset('1-200/20')">1–200</button>
        </div>
      </div>
      <div class="range-help">
        ◆ <strong>균등 분할</strong>: <code>시작-끝/구간크기</code> 형식 (예: <code>1-100/10</code>) →
        자동으로 1-10, 11-20, ... 으로 나눔.<br>
        ◆ <strong>비균등 분할</strong>: 콤마로 직접 구간 나열 (예: <code>1-10, 11-51, 52-102</code>) →
        구간마다 다른 크기 가능. 풀어본 진도가 일정하지 않을 때 유용.
      </div>
      <div class="range-summary" id="range-summary"></div>
      <div class="range-chart-wrap"><canvas id="range-chart"></canvas></div>
    </div>
  </section>

  </div>


<div class="modal-backdrop" id="modal-detail">
  <div class="modal" id="modal-content"></div>
</div>

<div class="modal-backdrop" id="modal-auth">
  <div class="modal auth-modal" id="modal-auth-content"></div>
</div>

<script>
  const DOMAINS = {
    1: { name: 'Resilient Architectures', color: '#ff6b35' },
    2: { name: 'High-Performing',         color: '#00d4a8' },
    3: { name: 'Secure Architectures',    color: '#ffd23f' },
    4: { name: 'Cost-Optimized',          color: '#a78bfa' },
  };

  const REVIEW_KEY = 'saa_review_counts_v1';
  let reviewCounts = {};
  try { reviewCounts = JSON.parse(localStorage.getItem(REVIEW_KEY) || '{}'); } catch(e) {}

  const NOTES_KEY = 'saa_notes_v1';
  let notes = {};
  try { notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}'); } catch(e) {}

  const BOOKMARKS_KEY = 'saa_bookmarks_v1';
  let bookmarks = {};
  try { bookmarks = JSON.parse(localStorage.getItem(BOOKMARKS_KEY) || '{}'); } catch(e) {}

  // Questions are loaded from Supabase `questions` table.
  // 오프라인/비로그인 UX 개선을 위해 localStorage에 캐시합니다.
  const QUESTIONS_CACHE_KEY = 'saa_questions_v1';
  let questionsCache = [];
  try { questionsCache = JSON.parse(localStorage.getItem(QUESTIONS_CACHE_KEY) || '[]'); } catch(e) { questionsCache = []; }
  // `picked` 필드는 UI에서 참조하므로, cache에 없으면 기본값 세팅
  questionsCache.forEach(q => { if (q && typeof q.picked === 'undefined') q.picked = ''; });

  function escapeHtml(s) {
    return (s == null ? '' : String(s))
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ============================================================
  // Supabase cloud sync
  // ============================================================
  const sb = window.supabase.createClient(
    window.SUPABASE_CONFIG.url,
    window.SUPABASE_CONFIG.anonKey,
    { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
  );

  let currentUser = null;
  let cloudOnline = false;

  function setCloudState(state, userEmail) {
    // state: 'off' | 'online' | 'syncing'
    const btn = document.getElementById('cloud-sync-btn');
    const text = document.getElementById('cloud-sync-text');
    if (!btn || !text) return;
    btn.classList.remove('online', 'syncing');
    if (state === 'online') {
      btn.classList.add('online');
      text.innerHTML = `<span class="label">Synced</span> <span class="email">${escapeHtml(userEmail || '')}</span>`;
    } else if (state === 'syncing') {
      btn.classList.add('syncing');
      text.innerHTML = `<span class="label">Syncing…</span>`;
    } else {
      text.innerHTML = `<span class="label">Cloud Sync</span> <span class="email">OFF</span>`;
    }
  }

  async function loadNotesFromCloud() {
    if (!currentUser) return;
    setCloudState('syncing');
    try {
      const { data, error } = await sb.from('notes').select('question_id, content, updated_at');
      if (error) throw error;

      // Cloud 값이 있는 질문은 cloud 버전으로 덮어씀
      const cloudMap = {};
      (data || []).forEach(r => { cloudMap[r.question_id] = r.content; notes[r.question_id] = r.content; });

      // 로컬에만 있는 메모를 cloud에 업로드 (첫 로그인 시 마이그레이션)
      const toUpload = [];
      for (const qid of Object.keys(notes)) {
        if (!(qid in cloudMap) && notes[qid] && notes[qid].trim() !== '') {
          toUpload.push({ user_id: currentUser.id, question_id: qid, content: notes[qid] });
        }
      }
      if (toUpload.length > 0) {
        const { error: upErr } = await sb.from('notes').upsert(toUpload);
        if (upErr) console.warn('migration upsert failed:', upErr);
      }

      localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
      setCloudState('online', currentUser.email);
    } catch (e) {
      console.error('loadNotesFromCloud:', e);
      setCloudState('off');
    }
  }

  async function loadQuestions() {
    if (!currentUser) return;
    try {
      const { data, error } = await sb
        .from('questions')
        .select('id, num, domain, topic, body, options, correct, explain')
        .order('num', { ascending: true });
      if (error) throw error;
      questionsCache = (data || []).map(q => ({ ...q, picked: '' }));
      localStorage.setItem(QUESTIONS_CACHE_KEY, JSON.stringify(questionsCache));
    } catch (e) {
      console.error('loadQuestions:', e);
    }
  }

  async function loadBookmarksFromCloud() {
    if (!currentUser) return;
    try {
      const { data, error } = await sb.from('bookmarks').select('question_id');
      if (error) throw error;
      const cloudSet = new Set((data || []).map(r => r.question_id));

      // 로컬에만 있는 북마크를 cloud로 업로드
      const localOnly = Object.keys(bookmarks).filter(qid => bookmarks[qid] && !cloudSet.has(qid));
      if (localOnly.length > 0) {
        const rows = localOnly.map(qid => ({ user_id: currentUser.id, question_id: qid }));
        const { error: upErr } = await sb.from('bookmarks').upsert(rows);
        if (upErr) console.warn('bookmarks migration failed:', upErr);
        localOnly.forEach(qid => cloudSet.add(qid));
      }

      // Cloud가 source of truth
      bookmarks = {};
      cloudSet.forEach(qid => { bookmarks[qid] = true; });
      localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));
    } catch (e) {
      console.error('loadBookmarksFromCloud:', e);
    }
  }

  async function toggleBookmark(id, event) {
    if (event) { event.stopPropagation(); event.preventDefault(); }
    const wasMarked = !!bookmarks[id];
    if (wasMarked) delete bookmarks[id];
    else bookmarks[id] = true;
    localStorage.setItem(BOOKMARKS_KEY, JSON.stringify(bookmarks));

    if (cloudOnline && currentUser) {
      try {
        if (wasMarked) {
          await sb.from('bookmarks').delete().match({ user_id: currentUser.id, question_id: id });
        } else {
          await sb.from('bookmarks').upsert({ user_id: currentUser.id, question_id: id });
        }
      } catch (e) { console.error('bookmark sync:', e); }
    }
    render();
    // 모달이 열려있으면 북마크 pill도 갱신
    if (modalState && modalState.q && modalState.q.id === id) renderModal();
  }

  async function initAuth() {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session && session.user) {
        currentUser = session.user;
        cloudOnline = true;
        await Promise.all([
          loadQuestions(),
          loadNotesFromCloud(),
          loadBookmarksFromCloud(),
        ]);
        render();
      } else {
        setCloudState('off');
      }
    } catch (e) {
      console.error('initAuth:', e);
      setCloudState('off');
    }

    sb.auth.onAuthStateChange(async (event, sess) => {
      if (event === 'SIGNED_IN' && sess && sess.user) {
        currentUser = sess.user;
        cloudOnline = true;
        await Promise.all([
          loadQuestions(),
          loadNotesFromCloud(),
          loadBookmarksFromCloud(),
        ]);
        render();
        closeAuthModal();
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        cloudOnline = false;
        // 로그아웃 시 문제 캐시도 비워서 질문 내용이 남지 않게
        questionsCache = [];
        localStorage.removeItem(QUESTIONS_CACHE_KEY);
        setCloudState('off');
        render();
      }
    });
  }

  // ---- Save note (cloud + local) ----
  let saveNoteTimer = null;
  function saveNote(id, value) {
    notes[id] = value;
    const status = document.getElementById('memo-status');
    if (status) { status.textContent = '저장 중...'; status.classList.remove('saved'); }
    if (saveNoteTimer) clearTimeout(saveNoteTimer);
    saveNoteTimer = setTimeout(async () => {
      // 항상 로컬 저장 (오프라인 캐시)
      localStorage.setItem(NOTES_KEY, JSON.stringify(notes));

      if (cloudOnline && currentUser) {
        try {
          const { error } = await sb.from('notes').upsert({
            user_id: currentUser.id,
            question_id: id,
            content: value,
            updated_at: new Date().toISOString(),
          });
          if (error) throw error;
          if (status) {
            status.textContent = '✓ 클라우드 저장됨';
            status.classList.add('saved');
            setTimeout(() => { if (status && status.textContent.startsWith('✓')) status.textContent = ''; }, 1800);
          }
        } catch (e) {
          console.error('cloud save:', e);
          if (status) { status.textContent = '⚠ 클라우드 실패 — 로컬 저장됨'; }
        }
      } else {
        if (status) {
          status.textContent = '✓ 로컬 저장됨 (로그인 시 동기화)';
          status.classList.add('saved');
          setTimeout(() => { if (status && status.textContent.startsWith('✓')) status.textContent = ''; }, 1800);
        }
      }
    }, 400);
  }

  // ---- Auth modal ----
  function openAuthModal() {
    renderAuthModal();
    document.getElementById('modal-auth').classList.add('open');
  }
  function closeAuthModal() {
    document.getElementById('modal-auth').classList.remove('open');
  }
  function renderAuthModal(msg, msgType) {
    const el = document.getElementById('modal-auth-content');
    if (currentUser) {
      const since = currentUser.last_sign_in_at ? new Date(currentUser.last_sign_in_at).toLocaleString('ko-KR') : '';
      el.innerHTML = `
        <button class="close" onclick="closeAuthModal()">×</button>
        <h3>Cloud Sync</h3>
        <p class="sub">메모가 Supabase에 자동 저장되고 모든 기기에서 동기화됩니다.</p>
        <div class="logged-in">
          <div class="who">${escapeHtml(currentUser.email)}</div>
          <div class="since">마지막 로그인: ${escapeHtml(since)}</div>
        </div>
        <button class="signout-btn" onclick="signOut()">로그아웃</button>
      `;
    } else {
      el.innerHTML = `
        <button class="close" onclick="closeAuthModal()">×</button>
        <h3>Cloud Sync 로그인</h3>
        <p class="sub">이메일로 매직 링크를 받습니다. 비밀번호 없이 클릭 한 번으로 로그인.</p>
        <form onsubmit="handleMagicLink(event)">
          <input type="email" id="auth-email" placeholder="your@email.com" required autocomplete="email" />
          <button type="submit" class="auth-submit" id="auth-submit-btn">매직 링크 받기</button>
        </form>
        ${msg ? `<div class="auth-msg ${msgType || ''}">${msg}</div>` : ''}
      `;
    }
  }

  async function handleMagicLink(e) {
    e.preventDefault();
    const email = document.getElementById('auth-email').value.trim();
    if (!email) return;
    const btn = document.getElementById('auth-submit-btn');
    btn.disabled = true;
    btn.textContent = '전송 중...';
    try {
      const { error } = await sb.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: window.location.origin + window.location.pathname }
      });
      if (error) throw error;
      renderAuthModal(`✓ <strong>${escapeHtml(email)}</strong>로 매직 링크를 보냈습니다. 이메일의 링크를 클릭하면 자동 로그인됩니다.`, 'ok');
    } catch (e) {
      console.error('magic link:', e);
      renderAuthModal(`전송 실패: ${escapeHtml(e.message || e.toString())}`, 'error');
    }
  }

  async function signOut() {
    await sb.auth.signOut();
    closeAuthModal();
  }

  document.getElementById('modal-auth').addEventListener('click', (e) => {
    if (e.target.id === 'modal-auth') closeAuthModal();
  });

  initAuth();

  let chart = null;
  // currentFilter: 'all' | 'bookmarked' | '1' | '2' | '3' | '4' | 'service:Lambda' (etc.)
  let currentFilter = 'all';

  // Pagination state for §01 question list
  let currentPage = 1;
  let pageSize = 10;
  try {
    const savedSize = parseInt(localStorage.getItem('saa_page_size_v1') || '', 10);
    if ([5,10,20,50].includes(savedSize)) pageSize = savedSize;
  } catch (e) {}

  function getQuestions() {
    return (questionsCache || []).slice().sort((a,b) => (a.num||0) - (b.num||0));
  }

  function setFilter(f, opts) {
    // opts.silent = true 이면 chip 활성 클래스 갱신 안 함 (서비스 필터 등 외부 트리거에서 사용)

      c.classList.toggle('active', c.dataset.filter === f);

  function clearServiceFilter() {
    setFilter('all');

  function render() {
    const qs = getQuestions();
    document.getElementById('stat-total').textContent = qs.length;
    document.getElementById('stat-domains').textContent = new Set(qs.map(q => q.domain)).size;
    renderInsight(qs);
    renderList(qs);
    renderChart(qs);

  }

  // AWS 서비스 키워드 (topic 파싱용) — 긴 이름이 먼저 와야 부분 매칭 오염 방지
  const SERVICE_KEYWORDS = [
    // 복합어 / 긴 이름 먼저
    'IAM Identity Center', 'Fast Snapshot Restore', 'Intelligent-Tiering',
    'Reserved Instance', 'On-Demand', 'Spot Instance',
    'Network Firewall', 'Firewall Manager', 'Global Accelerator', 'Auto Scaling',
    'Route 53', 'Route53', 'API Gateway', 'Step Functions', 'Storage Gateway',
    'Gateway Endpoint', 'VPC Endpoint', 'NAT Gateway', 'Internet Gateway',
    'Direct Connect', 'Transit Gateway', 'Secrets Manager', 'Systems Manager',
    'Session Manager', 'Run Command', 'Object Lock', 'Job Bookmark',
    'CloudFront', 'CloudWatch', 'CloudTrail', 'CloudFormation',
    'EventBridge', 'Organizations', 'PrivateLink', 'Bastion',
    'DynamoDB', 'ElastiCache', 'GuardDuty', 'Inspector', 'Macie',
    'Rekognition', 'QuickSight', 'Transfer Family',
    'Kinesis', 'Redshift', 'Athena', 'Glue', 'DataSync', 'Snowball', 'Backup',
    'Fargate', 'Lambda', 'Aurora', 'Cognito', 'Config', 'Shield', 'WAF',

  function extractServices(topic) {
    const found = new Set();
    let lower = (topic || '').toLowerCase();
    // 긴 키워드가 먼저 매칭되도록 SERVICE_KEYWORDS가 정렬돼 있음.
    // 매칭된 구간은 공백으로 치환해서 짧은 키워드가 같은 위치에서 중복 매칭되는 것을 방지
    // (예: "VPC Endpoint" 매치 후 "VPC"가 다시 매치되면 안 됨)
    for (const s of SERVICE_KEYWORDS) {
      const needle = s.toLowerCase();
      if (lower.includes(needle)) {
        found.add(s);
        lower = lower.split(needle).join(' ');
      }
    }
    return [...found];
  }

  function renderInsight(qs) {
    const box = document.getElementById('insight-box');
    const n = qs.length;
    if (n === 0) { box.innerHTML = ''; return; }

    // 도메인 집계
    const counts = {1:0,2:0,3:0,4:0};
    qs.forEach(q => counts[q.domain]++);
    let maxD = 1, maxV = 0;
    for (const d in counts) if (counts[d] > maxV) { maxV = counts[d]; maxD = d; }
    const pct = Math.round((maxV / n) * 100);

    // 서비스 집계
    const serviceCounts = {};
    qs.forEach(q => {
      extractServices(q.topic).forEach(s => {
        serviceCounts[s] = (serviceCounts[s] || 0) + 1;
      });
    });
    const serviceEntries = Object.entries(serviceCounts).sort((a,b) => b[1]-a[1]);
    const repeatServices = serviceEntries.filter(([, c]) => c >= 2);

    // 주제 반복 (동일 topic 문자열)
    const topicCounts = {};
    qs.forEach(q => { const t = q.topic || '미분류'; topicCounts[t] = (topicCounts[t]||0)+1; });
    const repeatTopics = Object.entries(topicCounts).filter(([, c]) => c >= 2).sort((a,b) => b[1]-a[1]);

    let html = '';
    if (n < 3) {
      html = `<div class="insight"><div class="label">◆ Pattern Detected</div><div class="msg">데이터가 아직 적습니다 (n=${n}). 3개 이상 누적되면 패턴이 드러납니다.</div></div>`;
    } else {
      let msg = `전체 오답의 <strong style="color:var(--accent)">${pct}%</strong>가 <strong>${DOMAINS[maxD].name}</strong>에 해당합니다.`;
      if (repeatTopics.length > 0) {
        msg += ` 특히 <strong style="color:var(--accent-3)">${escapeHtml(repeatTopics[0][0])}</strong> 주제가 <strong>${repeatTopics[0][1]}번</strong> 반복됐습니다.`;
      } else if (repeatServices.length > 0) {
        const top = repeatServices.slice(0, 2).map(([s,c]) => `<strong style="color:var(--accent-3)">${escapeHtml(s)}</strong>(${c}회)`).join(', ');
        msg += ` ${top} 관련 문제가 반복 출제되고 있습니다.`;
      }

      html = `<div class="insight"><div class="label">◆ Pattern Detected</div><div class="msg">${msg}</div>`;

      // 서비스 breakdown (top 20, 2회 이상은 hot 강조). 클릭 시 §01 리스트 필터링.
      const topServices = serviceEntries.slice(0, 20);
      if (topServices.length > 0) {
        html += `<div class="service-breakdown">
          <div class="sb-label">◆ Service Frequency</div>
          <div class="sb-row">${topServices.map(([s,c]) => {
            const active = currentFilter === ('service:' + s);
            const cls = `sb-chip ${c >= 2 ? 'hot' : ''} ${active ? 'active' : ''}`;
            return `<button type="button" class="${cls}" onclick="setFilter('service:${escapeHtml(s)}')" title="${escapeHtml(s)} 관련 문제만 보기">
              <span class="sb-name">${escapeHtml(s)}</span><span class="sb-count">${c}</span>
            </button>`;
          }).join('')}</div>
        </div>`;
      }
      html += `</div>`;
    }
    box.innerHTML = html;
  }

  function renderList(qs) {
    const wrap = document.getElementById('qlist');
    const bannerSlot = document.getElementById('filter-banner-slot');
    const pagerSlot = document.getElementById('pager-slot');

    let items = qs;
    let serviceName = null;
    if (currentFilter === 'bookmarked') {
      items = items.filter(q => bookmarks[q.id]);
    } else if (currentFilter && currentFilter.startsWith('service:')) {
      serviceName = currentFilter.slice('service:'.length);
      const needle = serviceName.toLowerCase();
      items = items.filter(q => (q.topic || '').toLowerCase().includes(needle));
    } else if (currentFilter !== 'all') {
      items = items.filter(q => String(q.domain) === currentFilter);
    }

    // 서비스 필터 활성 시 §01 위에 배너 표시
    if (bannerSlot) {
      bannerSlot.innerHTML = serviceName
        ? `<div class="filter-banner">
             <span class="fb-label">필터링 중</span>
             <span class="fb-name">${escapeHtml(serviceName)}</span>
             <span style="color:var(--ink-faint); font-size:11px;">— ${items.length}개 매칭</span>
             <button class="fb-clear" onclick="clearServiceFilter()">× 클리어</button>
           </div>`
        : '';
    }

    if (items.length === 0) {
      let emptyMsg;
      if (serviceName) {
        emptyMsg = `<div class="empty"><h3>${escapeHtml(serviceName)} 관련 문제가 없습니다</h3><p>다른 서비스를 선택하거나 필터를 클리어하세요.</p></div>`;
      } else if (currentFilter === 'bookmarked') {
        emptyMsg = `<div class="empty"><h3>북마크한 문제가 없습니다</h3><p>문제 옆의 ★을 눌러 중요한 문제를 표시해두세요.</p></div>`;
      } else if (!currentUser) {
        emptyMsg = `<div class="empty"><h3>로그인하면 문제가 나타납니다</h3><p>문제 데이터는 Supabase DB에 저장되어 있습니다. 우측 상단 <strong>Cloud Sync</strong> 버튼으로 로그인하세요.</p></div>`;
      } else {
        emptyMsg = `<div class="empty"><h3>아직 비어 있습니다</h3><p>Claude에게 스크린샷을 보내서 문제를 추가하세요.</p></div>`;
      }
      wrap.innerHTML = emptyMsg;
      if (pagerSlot) pagerSlot.innerHTML = '';
      return;
    }

    // 페이징
    const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const startIdx = (currentPage - 1) * pageSize;
    const pageItems = items.slice(startIdx, startIdx + pageSize);

    wrap.innerHTML = pageItems.map(q => {
      const marked = !!bookmarks[q.id];
      return `
      <div class="qitem ${marked ? 'bookmarked' : ''}" onclick="openDetail('${q.id}')">
        <div class="qnum">#${String(q.num).padStart(2,'0')}</div>
        <div class="qbody">
          <div class="qtitle">${q.topic || '(주제 미지정)'}</div>
          <div class="qmeta">
            <span class="tag">${DOMAINS[q.domain].name}</span>
            <span class="sep">│</span>
            <span>${(q.body || '').slice(0, 60)}${(q.body || '').length > 60 ? '…' : ''}</span>
          </div>
        </div>
        <div class="answers">
          <div>picked <span class="wrong">${q.picked || '—'}</span></div>
          <div>answer <span class="right">${q.correct}</span></div>
        </div>
        <button class="bookmark-btn ${marked ? 'active' : ''}" onclick="toggleBookmark('${q.id}', event)" title="${marked ? '북마크 해제' : '북마크'}">${marked ? '★' : '☆'}</button>
      </div>`;
    }).join('');

    if (pagerSlot) pagerSlot.innerHTML = renderPagerHTML(items.length, totalPages, startIdx, pageItems.length);
  }

  // ---- Pagination helpers ----
  function renderPagerHTML(totalItems, totalPages, startIdx, shownCount) {
    const fromN = startIdx + 1;
    const toN = startIdx + shownCount;

    // 페이지 번호 버튼: 처음, 끝, 현재 주변 ±2 만 노출. 그 사이는 ... 으로.
    const pages = [];
    const push = (p) => pages.push(p);
    const window = 2;
    const min = Math.max(1, currentPage - window);
    const max = Math.min(totalPages, currentPage + window);
    if (min > 1) push(1);
    if (min > 2) push('…');
    for (let p = min; p <= max; p++) push(p);
    if (max < totalPages - 1) push('…');
    if (max < totalPages) push(totalPages);

    const buttons = pages.map(p => {
      if (p === '…') return `<span class="pg-ellipsis">…</span>`;
      const active = p === currentPage ? 'active' : '';
      return `<button class="${active}" onclick="goToPage(${p})">${p}</button>`;
    }).join('');

    return `
      <div class="pager">
        <div class="pg-info"><strong>${fromN}</strong>–<strong>${toN}</strong> / <strong>${totalItems}</strong>개</div>
        <div class="pg-controls">
          <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} title="이전">‹</button>
          ${buttons}
          <button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''} title="다음">›</button>
        </div>
        <label class="pg-size">
          페이지당
          <select onchange="setPageSize(this.value)">
            <option value="5"  ${pageSize===5  ? 'selected' : ''}>5</option>
            <option value="10" ${pageSize===10 ? 'selected' : ''}>10</option>
            <option value="20" ${pageSize===20 ? 'selected' : ''}>20</option>
            <option value="50" ${pageSize===50 ? 'selected' : ''}>50</option>
          </select>
        </label>
      </div>`;
  }

  function goToPage(p) {
    const n = parseInt(p, 10);
    if (!Number.isFinite(n)) return;
    currentPage = n;
    renderList(getQuestions());
    // 리스트 상단으로 스크롤
    const top = document.getElementById('filterbar');
    if (top) top.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setPageSize(v) {
    const n = parseInt(v, 10);
    if (![5,10,20,50].includes(n)) return;
    pageSize = n;
    currentPage = 1;
    try { localStorage.setItem('saa_page_size_v1', String(n)); } catch (e) {}
    renderList(getQuestions());
  }

  function renderChart(qs) {
    const ctx = document.getElementById('domain-chart');
    const counts = {1:0,2:0,3:0,4:0};
    qs.forEach(q => counts[q.domain]++);
    const data = {
      labels: ['Resilient', 'Performance', 'Secure', 'Cost'],
      datasets: [{
        label: 'Wrong Answers',
        data: [counts[1], counts[2], counts[3], counts[4]],
        backgroundColor: 'rgba(255,107,53,0.15)',
        borderColor: '#ff6b35',
        borderWidth: 2,
        pointBackgroundColor: ['#ff6b35','#00d4a8','#ffd23f','#a78bfa'],
        pointBorderColor: '#0a0e1a',
        pointBorderWidth: 2,
        pointRadius: 6,
        pointHoverRadius: 9,
      }]
    };
    const maxVal = Math.max(3, ...Object.values(counts));
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'radar',
      data,
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          r: {
            min: 0, max: maxVal,
            ticks: { stepSize: Math.max(1, Math.ceil(maxVal/4)), color: '#4a5268', backdropColor: 'transparent', font: { family: 'JetBrains Mono', size: 10 } },
            grid: { color: 'rgba(255,255,255,0.08)' },
            angleLines: { color: 'rgba(255,255,255,0.12)' },
            pointLabels: { color: '#e8ecf5', font: { family: 'Fraunces', size: 13, weight: '600', style: 'italic' } }
          }
        }
      }
    });
    const total = qs.length || 1;
    document.getElementById('chart-legend').innerHTML = Object.keys(DOMAINS).map(d => {
      const c = counts[d];
      const pct = Math.round((c/total)*100);
      return `<div class="legend-row"><span class="swatch" style="background:${DOMAINS[d].color}"></span><span class="name">${DOMAINS[d].name}</span><span class="pct">${pct}%</span><span class="cnt">${c}개</span></div>`;
    }).join('');
  }

  // ============================================================
  // Range Accuracy Chart — 문제 번호 구간별 정답률/오답률 추세 (꺾은선)
  // ============================================================
  let rangeChart = null;

  function setRangePreset(spec) {
    const el = document.getElementById('range-input');
    if (!el) return;
    el.value = expandRangeSpec(spec); // 균등 형식이면 명시적 구간으로 펼쳐서 보여줌
    renderRangeChart();
  }

  // ----- 구간 입력 파싱 -----
  // 지원 포맷:
  //   "1-100/10"               → 균등 분할 (1-10, 11-20, ..., 91-100)
  //   "10"                     → 1부터 끝까지 10씩 (끝이 없으면 maxNum 사용)
  //   "1-10, 11-51, 52-102"    → 비균등 명시
  //   "1-10; 11-51"            → 세미콜론도 허용
  function parseRangeSpec(raw) {
    const s = String(raw || '').trim();
    if (!s) return [];

    // "from-to/bucket" 균등 형식
    const uniform = s.match(/^(\d+)\s*-\s*(\d+)\s*\/\s*(\d+)$/);
    if (uniform) {
      const from = parseInt(uniform[1], 10);
      const to   = parseInt(uniform[2], 10);
      const bk   = parseInt(uniform[3], 10);
      return buildUniformBuckets(from, to, bk);
    }

    // 단일 숫자 = 1부터 maxNum까지 그 크기로
    if (/^\d+$/.test(s)) {
      const bk = parseInt(s, 10);
      const qs = getQuestions();
      const maxNum = qs.length ? Math.max(...qs.map(q => parseInt(q.num,10) || 0)) : 100;
      return buildUniformBuckets(1, Math.max(maxNum, bk), bk);
    }

    // 콤마/세미콜론 구분 구간 리스트
    const parts = s.split(/[,;]/).map(p => p.trim()).filter(Boolean);
    const buckets = [];
    for (const p of parts) {
      const m = p.match(/^(\d+)\s*[-~–—]\s*(\d+)$/);
      if (!m) continue;
      let a = parseInt(m[1], 10);
      let b = parseInt(m[2], 10);
      if (!Number.isFinite(a) || !Number.isFinite(b)) continue;
      if (a > b) { const t=a; a=b; b=t; }
      if (a < 1) a = 1;
      buckets.push([a, b]);
    }
    return buckets;
  }

  function buildUniformBuckets(from, to, bk) {
    if (!Number.isFinite(from) || from < 1) from = 1;
    if (!Number.isFinite(to)   || to   < from) to = from;
    if (!Number.isFinite(bk)   || bk   < 1) bk = Math.max(1, Math.ceil((to - from + 1) / 10));
    // 너무 잘게 쪼개지지 않도록 max 100구간
    const totalRange = to - from + 1;
    if (totalRange / bk > 100) bk = Math.ceil(totalRange / 100);
    const out = [];
    for (let s = from; s <= to; s += bk) out.push([s, Math.min(s + bk - 1, to)]);
    return out;
  }

  // 균등/단축 입력을 명시적 "1-10, 11-20, ..." 으로 펼쳐서 input에 보여주는 헬퍼
  function expandRangeSpec(spec) {
    const buckets = parseRangeSpec(spec);
    return buckets.map(([a,b]) => a === b ? `${a}` : `${a}-${b}`).join(', ');
  }

  function renderRangeChart() {
    const ctx = document.getElementById('range-chart');
    if (!ctx) return;

    const inputEl = document.getElementById('range-input');
    const raw = inputEl ? inputEl.value : '1-100/10';
    let buckets = parseRangeSpec(raw);

    if (buckets.length === 0) {
      // 파싱 실패 → 기본값으로 폴백
      buckets = buildUniformBuckets(1, 100, 10);
      if (inputEl) inputEl.value = '1-100/10';
    }

    // 입력을 명시적 구간으로 정규화해서 다시 보여주기 (재현·편집 쉽게)
    if (inputEl) inputEl.value = buckets.map(([a,b]) => a === b ? `${a}` : `${a}-${b}`).join(', ');

    // 범위 안에 들어오는 오답 문제 번호 집합
    const minStart = Math.min(...buckets.map(b => b[0]));
    const maxEnd   = Math.max(...buckets.map(b => b[1]));
    const wrongNums = new Set();
    getQuestions().forEach(q => {
      const n = parseInt(q.num, 10);
      if (Number.isFinite(n) && n >= minStart && n <= maxEnd) wrongNums.add(n);
    });

    // 구간별 집계: 정답률(%) / 오답률(%) + 카운트
    const labels = [];
    const rightPctArr = [];
    const wrongPctArr = [];
    const wrongCounts = [];
    const rightCounts = [];
    const sizes = [];

    for (const [start, end] of buckets) {
      const total = end - start + 1;
      let wrong = 0;
      for (let n = start; n <= end; n++) if (wrongNums.has(n)) wrong++;
      const right = total - wrong;
      const wPct = total > 0 ? Math.round((wrong / total) * 1000) / 10 : 0;
      const rPct = Math.round((100 - wPct) * 10) / 10;
      labels.push(start === end ? `${start}` : `${start}–${end}`);
      wrongCounts.push(wrong);
      rightCounts.push(right);
      wrongPctArr.push(wPct);
      rightPctArr.push(rPct);
      sizes.push(total);
    }

    // 전체 요약
    const totalRange = sizes.reduce((a,b) => a+b, 0);
    const totalWrong = wrongCounts.reduce((a,b) => a+b, 0);
    const totalRight = totalRange - totalWrong;
    const overallWrongPct = totalRange > 0 ? Math.round((totalWrong / totalRange) * 1000) / 10 : 0;
    const overallRightPct = Math.round((100 - overallWrongPct) * 10) / 10;

    // 추세 화살표: 첫 vs 마지막 구간 정답률 비교
    let trendIcon = '';
    if (rightPctArr.length >= 2) {
      const first = rightPctArr[0];
      const last  = rightPctArr[rightPctArr.length - 1];
      const diff = Math.round((last - first) * 10) / 10;
      if (diff > 0)      trendIcon = `<span style="color:var(--accent-2)">▲ +${diff}%p</span>`;
      else if (diff < 0) trendIcon = `<span style="color:var(--danger)">▼ ${diff}%p</span>`;
      else               trendIcon = `<span style="color:var(--ink-faint)">→ 0</span>`;
    }

    document.getElementById('range-summary').innerHTML = `
      <span><span class="smetric">Range</span> <span class="sval">${minStart}–${maxEnd}</span> <span class="smetric">(${totalRange}문제, ${labels.length}구간)</span></span>
      <span class="ssep">│</span>
      <span><span class="smetric">오답</span> <span class="sval wrong">${totalWrong}</span> <span class="smetric">(${overallWrongPct}%)</span></span>
      <span class="ssep">│</span>
      <span><span class="smetric">정답</span> <span class="sval right">${totalRight}</span> <span class="smetric">(${overallRightPct}%)</span></span>
      ${trendIcon ? `<span class="ssep">│</span><span><span class="smetric">정답률 추세</span> ${trendIcon}</span>` : ''}
    `;

    // Chart.js line chart — 정답률↑ / 오답률↓ 추세
    if (rangeChart) rangeChart.destroy();
    rangeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: '정답률 %',
            data: rightPctArr,
            borderColor: 'rgba(0, 212, 168, 1)',
            backgroundColor: 'rgba(0, 212, 168, 0.12)',
            borderWidth: 2.5,
            pointBackgroundColor: 'rgba(0, 212, 168, 1)',
            pointBorderColor: '#0a0e1a',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 8,
            tension: 0.3,
            fill: true,
          },
          {
            label: '오답률 %',
            data: wrongPctArr,
            borderColor: 'rgba(255, 62, 95, 1)',
            backgroundColor: 'rgba(255, 62, 95, 0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: 'rgba(255, 62, 95, 1)',
            pointBorderColor: '#0a0e1a',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 8,
            tension: 0.3,
            fill: false,
            borderDash: [4, 4],
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            position: 'top',
            align: 'end',
            labels: { color: '#e8ecf5', font: { family: 'JetBrains Mono', size: 11 }, boxWidth: 18, boxHeight: 3, padding: 14, usePointStyle: false }
          },
          tooltip: {
            backgroundColor: '#0a0e1a',
            borderColor: '#303a52',
            borderWidth: 1,
            titleFont: { family: 'Fraunces', size: 13, weight: '600' },
            bodyFont: { family: 'JetBrains Mono', size: 11 },
            padding: 12,
            callbacks: {
              afterBody: (items) => {
                if (!items.length) return '';
                const idx = items[0].dataIndex;
                return [
                  ` 오답: ${wrongCounts[idx]}개 / 총 ${sizes[idx]}개`,
                ];
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#8892a6', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 45, minRotation: 0 },
            grid: { color: 'rgba(255,255,255,0.04)' }
          },
          y: {
            min: 0, max: 100,
            ticks: {
              color: '#8892a6',
              stepSize: 20,
              font: { family: 'JetBrains Mono', size: 10 },
              callback: (v) => v + '%'
            },
            grid: { color: 'rgba(255,255,255,0.05)' },
            title: { display: true, text: '비율 (%)', color: '#4a5268', font: { family: 'JetBrains Mono', size: 10 } }
          }
        }
      }
    });
  }

  // Enter 키로도 바로 계산되도록 입력에 핸들러 부착
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('range-input');
    if (el) el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); renderRangeChart(); } });
  });
  // DOMContentLoaded는 이미 지났을 가능성이 높으므로 즉시도 시도
  (() => {
    const el = document.getElementById('range-input');
    if (el && !el.dataset.bound) {
      el.dataset.bound = '1';
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); renderRangeChart(); } });
    }
  })();

  let modalState = null;

  // --- multi-answer helpers ---
  // correct 필드는 "C" 또는 "C,D" 형식. 항상 정렬된 letter 배열로 반환.
  function parseCorrect(q) {
    return String(q && q.correct || '')
      .split(',')
      .map(s => s.trim())
      .filter(Boolean)
      .sort();
  }
  function isMulti(q) { return parseCorrect(q).length > 1; }

  // --- navigation helpers: 현재 필터 안에서 이전/다음 문제 찾기 ---
  function getFilteredOrder() {
    let items = getQuestions(); // 이미 num 오름차순
    if (currentFilter === 'bookmarked') {
      items = items.filter(q => bookmarks[q.id]);
    } else if (currentFilter && currentFilter.startsWith('service:')) {
      const needle = currentFilter.slice('service:'.length).toLowerCase();
      items = items.filter(q => (q.topic || '').toLowerCase().includes(needle));
    } else if (currentFilter !== 'all' && currentFilter) {
      items = items.filter(q => String(q.domain) === currentFilter);
    }
    return items;
  }
  function findSiblings(qid) {
    const items = getFilteredOrder();
    const idx = items.findIndex(q => q.id === qid);
    if (idx >= 0) {
      return {
        prev: idx > 0 ? items[idx - 1] : null,
        next: idx < items.length - 1 ? items[idx + 1] : null,
        position: idx + 1,
        total: items.length,
        inFilter: true,
      };
    }
    // 현재 질문이 필터 밖에 있으면 전체에서 찾기 (안전망)
    const all = getQuestions();
    const i = all.findIndex(q => q.id === qid);
    return {
      prev: i > 0 ? all[i - 1] : null,
      next: i >= 0 && i < all.length - 1 ? all[i + 1] : null,
      position: i + 1,
      total: all.length,
      inFilter: false,
    };
  }
  function navPrev() {
    if (!modalState) return;
    const s = findSiblings(modalState.q.id);
    if (s.prev) openDetail(s.prev.id);
  }
  function navNext() {
    if (!modalState) return;
    const s = findSiblings(modalState.q.id);
    if (s.next) openDetail(s.next.id);
  }
  function renderNavHTML(prev, next) {
    const prevTitle = prev ? escapeHtml(prev.topic || '') : '';
    const nextTitle = next ? escapeHtml(next.topic || '') : '';
    return `<button class="modal-side-nav prev" onclick="navPrev()" ${prev ? '' : 'disabled'} title="${prevTitle}" aria-label="이전 문제">‹</button>
      <button class="modal-side-nav next" onclick="navNext()" ${next ? '' : 'disabled'} title="${nextTitle}" aria-label="다음 문제">›</button>`;
  }

  function openDetail(id) {
    const q = getQuestions().find(x => x.id === id);
    if (!q) return;
    // 모달 열 때는 항상 quiz mode로 시작 (답/해설 숨김)
    // userPicks: 선택한 letter 배열 (단일답이면 길이 0 또는 1, 복수답이면 여러 개)
    modalState = { q, revealed: false, userPicks: [] };
    renderModal();
    const modal = document.getElementById('modal-detail');
    modal.classList.add('open');
    // 스크롤 최상단으로 초기화 (이전 질문의 스크롤 위치 잔존 방지)
    const inner = document.getElementById('modal-content');
    if (inner && inner.parentElement) inner.parentElement.scrollTop = 0;
  }

  function renderModal() {
    if (!modalState) return;
    const { q, revealed, userPicks } = modalState;
    const reviews = reviewCounts[q.id] || 0;
    const note = notes[q.id] || '';
    const correctList = parseCorrect(q);
    const correctSet = new Set(correctList);
    const multi = correctList.length > 1;
    const pickedSet = new Set(userPicks);
    const pickedLabel = userPicks.slice().sort().join(', ');
    const correctLabel = correctList.join(', ');

    // 전부 맞췄는지 (복수답일 때 쓰임)
    const allCorrect = revealed
      && userPicks.length === correctList.length
      && userPicks.every(l => correctSet.has(l));

    // 이전/다음 문제 계산 (현재 필터 기준). 뷰포트 중앙에 고정된 사이드 화살표.
    const sib = findSiblings(q.id);
    const sideNav = renderNavHTML(sib.prev, sib.next);

    document.getElementById('modal-content').innerHTML = `
      <button class="close" onclick="closeDetail()">×</button>
      ${sideNav}
      <h3>#${String(q.num).padStart(2,'0')} · ${q.topic}</h3>
      <div class="qmeta-big">
        <span class="pill hot">${DOMAINS[q.domain].name}</span>
        <span class="pill bookmark-pill ${bookmarks[q.id] ? 'active' : ''}" onclick="toggleBookmark('${q.id}', event)" title="${bookmarks[q.id] ? '북마크 해제' : '북마크 추가'}">${bookmarks[q.id] ? '★ Bookmarked' : '☆ Bookmark'}</span>
        ${revealed
          ? `${pickedLabel ? `<span class="pill ${allCorrect ? 'ok' : 'wrong'}">내 선택: ${pickedLabel}${allCorrect ? ' ✓' : ''}</span>` : ''}<span class="pill ok">정답: ${correctLabel}</span>`
          : `<span class="pill quiz">Quiz Mode · 답 숨김</span>${multi ? '<span class="pill multi">복수 정답 (' + correctList.length + '개 선택)</span>' : ''}`
        }
      </div>
      <div class="q-text">${q.body || '(본문 없음)'}</div>
      ${q.options && q.options.length ? `
        <h4>◆ Options</h4>
        <div class="options">${q.options.map(o => {
          let cls = '';
          if (revealed) {
            cls = 'revealed';
            if (correctSet.has(o.k)) cls += ' correct';
            else if (pickedSet.has(o.k)) cls += ' picked-wrong';
          } else if (pickedSet.has(o.k)) {
            cls = 'picked';
          }
          const handler = revealed ? '' : `onclick="pickOption('${o.k}')"`;
          // 복수답일 때는 체크박스 느낌의 표식
          const badge = (!revealed && multi)
            ? `<span class="multi-check">${pickedSet.has(o.k) ? '✓' : ''}</span>`
            : '';
          return `<div class="opt ${cls}" ${handler}>${badge}<span class="letter">${o.k}</span><span>${o.v}</span></div>`;
        }).join('')}</div>
      ` : ''}
      ${revealed
        ? `${q.explain ? `<h4>◆ Why</h4><div class="explain">${q.explain}</div>` : ''}
           <button class="retry-btn" onclick="resetQuiz()">↻ 다시 풀기 (답 다시 숨기기)</button>`
        : `<button class="reveal-btn subtle" onclick="revealAnswer()">정답 보기</button>`
      }
      <div class="memo-section">
        <div class="memo-header">
          <span class="label">◆ My Notes</span>
          <span class="memo-status" id="memo-status"></span>
        </div>
        <textarea class="memo-box" placeholder="여기에 나만의 메모를 간략히 적어두세요..." oninput="saveNote('${q.id}', this.value)">${escapeHtml(note)}</textarea>
      </div>
      <div class="review-tracker">
        <span class="label">Reviewed</span>
        <span class="count" id="review-count">${reviews}</span>
        <span class="label">times</span>
        <button class="review-btn" onclick="addReview('${q.id}')">+ Mark Reviewed</button>
      </div>`;
  }

  function pickOption(letter) {
    if (!modalState || modalState.revealed) return;
    const { q } = modalState;
    const picks = modalState.userPicks;
    const idx = picks.indexOf(letter);

    if (isMulti(q)) {
      // 복수답: 토글. 공개는 사용자가 직접 버튼으로.
      if (idx >= 0) picks.splice(idx, 1);
      else picks.push(letter);
      picks.sort();
      renderModal();
    } else {
      // 단일답: 클릭 즉시 공개.
      modalState.userPicks = [letter];
      modalState.revealed = true;
      renderModal();
      scrollModalToAnswer();
    }
  }

  function revealAnswer() {
    if (!modalState) return;
    modalState.revealed = true;
    renderModal();
    scrollModalToAnswer();
  }

  function scrollModalToAnswer() {
    // 공개 직후 해설 섹션이 보이도록 스크롤
    requestAnimationFrame(() => {
      const explainEl = document.querySelector('#modal-content .explain');
      if (explainEl && typeof explainEl.scrollIntoView === 'function') {
        explainEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  }

  function resetQuiz() {
    if (!modalState) return;
    modalState.revealed = false;
    modalState.userPicks = [];
    renderModal();
    // 스크롤을 모달 상단으로
    const modal = document.getElementById('modal-content');
    if (modal) modal.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeDetail() {
    modalState = null;
    document.getElementById('modal-detail').classList.remove('open');
  }

  function addReview(id) {
    reviewCounts[id] = (reviewCounts[id] || 0) + 1;
    localStorage.setItem(REVIEW_KEY, JSON.stringify(reviewCounts));
    document.getElementById('review-count').textContent = reviewCounts[id];
  }

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      renderList(getQuestions());
    });
  });

  document.getElementById('modal-detail').addEventListener('click', (e) => {
    if (e.target.id === 'modal-detail') closeDetail();
  });

  // 키보드 단축키: 모달 열려있을 때 ← / → 로 이전/다음 문제, Esc 닫기
  document.addEventListener('keydown', (e) => {
    if (!modalState) return;
    // 메모 textarea 등 입력 중엔 네비 건너뜀 (사용자가 글 쓰는 중일 수 있음)
    const t = e.target;
    const typing = t && (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.isContentEditable);
    if (typing && e.key !== 'Escape') return;
    if (e.key === 'ArrowLeft')       { e.preventDefault(); navPrev(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); navNext(); }
    else if (e.key === 'Escape')     { closeDetail(); }
  });

  render();
</script>

</body>
</html>
